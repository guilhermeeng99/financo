name: financo
description: "Personal finance manager with AI-powered data entry."
publish_to: 'none'
version: 1.0.1+6

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  bloc: ^9.0.0

  # Dependency Injection
  get_it: ^9.2.1

  # Routing
  go_router: ^17.2.1

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  cloud_functions: ^6.0.0
  firebase_messaging: ^16.1.0

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Error Handling
  dartz: ^0.10.1

  # Internationalization
  slang_flutter: ^4.14.0

  # UI
  google_fonts: ^8.0.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^11.0.0
  flutter_animate: ^4.5.2

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  google_sign_in: ^7.2.0
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  csv: ^8.0.0
  file_picker: ^11.0.2
  web: ^1.1.1

  # Audio
  record: ^6.0.0
  path_provider: ^2.1.5

  # Image
  image_picker: ^1.1.2

  # Networking
  http: ^1.3.0

  # App metadata (cross-platform package version)
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
  slang_build_runner: ^4.14.0
  build_runner: ^2.4.15
  mocktail: ^1.0.4
  fake_cloud_firestore: ^4.1.0+1
  bloc_test: ^10.0.0
  drift_dev: ^2.32.1

flutter:
  uses-material-design: true

  assets:
    - lib/app/assets/images/
    - lib/app/assets/samples/
